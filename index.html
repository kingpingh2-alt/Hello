<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EV Power Sharing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⚡ EV Power Sharing</h1>

<div class="container">
    
    <label>Battery Available (%)</label>
    <input type="number" id="battery" placeholder="Enter battery %">

    <label>Energy to Sell/Buy (kWh)</label>
    <input type="number" id="energy" placeholder="Enter kWh">

    <label>Price per kWh (₹)</label>
    <input type="number" id="price" placeholder="Enter price">

    <label>Action</label>
    <select id="action">
        <option value="sell">Sell Power</option>
        <option value="buy">Buy Power</option>
    </select>

    <button onclick="calculate()">Calculate</button>

    <h2 id="result"></h2>

</div>

<script src="script.js"></script>
</body>
</html>
